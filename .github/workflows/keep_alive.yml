name: Render Siteyi Uyanik Tut

on:
  schedule:
    # Her 6 dakikada bir çalışır (Render 15 dakikada uyur)
    - cron: '*/3 * * * *'
  workflow_dispatch: # Manuel olarak da başlatabilmen için

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Siteye Istek At
        run: |
          curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 \
            -o /dev/null https://entry-project.onrender.com/privacy-policy/